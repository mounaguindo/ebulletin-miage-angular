<app-page-header
  title="Employés"
  subtitle="Gestion des employés">
</app-page-header>



<div class="actions-container">


<button
mat-raised-button
color="primary"
(click)="ouvrirFormulaire()">

Ajouter un employé

</button>


</div>



<br><br>




<table
mat-table
[dataSource]="employes"
class="mat-elevation-z8">





<!-- Matricule -->

<ng-container matColumnDef="matricule">


<th mat-header-cell *matHeaderCellDef>

Matricule

</th>


<td mat-cell *matCellDef="let employe">


{{employe.matricule}}


</td>


</ng-container>







<!-- Nom -->

<ng-container matColumnDef="nom">


<th mat-header-cell *matHeaderCellDef>

Nom complet

</th>


<td mat-cell *matCellDef="let employe">


{{employe.nom}} {{employe.prenom}}


</td>


</ng-container>







<!-- Poste -->

<ng-container matColumnDef="poste">


<th mat-header-cell *matHeaderCellDef>

Poste

</th>


<td mat-cell *matCellDef="let employe">


{{employe.poste}}


</td>


</ng-container>







<!-- Département -->

<ng-container matColumnDef="departement">


<th mat-header-cell *matHeaderCellDef>

Département

</th>


<td mat-cell *matCellDef="let employe">


{{employe.departement}}


</td>


</ng-container>







<!-- Salaire -->

<ng-container matColumnDef="salaireBrut">


<th mat-header-cell *matHeaderCellDef>

Salaire

</th>


<td mat-cell *matCellDef="let employe">


{{employe.salaireBrut}} FCFA


</td>


</ng-container>







<!-- Actif -->

<ng-container matColumnDef="actif">


<th mat-header-cell *matHeaderCellDef>

Actif

</th>


<td mat-cell *matCellDef="let employe">


{{employe.actif ? 'Oui':'Non'}}


</td>


</ng-container>








<!-- Actions -->

<ng-container matColumnDef="actions">


<th mat-header-cell *matHeaderCellDef>

Actions

</th>


<td mat-cell *matCellDef="let employe">



<button

mat-button

color="primary"

(click)="modifier(employe)">

Modifier

</button>




<button

mat-button

color="warn"

(click)="supprimer(employe.id)">

Supprimer

</button>



</td>


</ng-container>









<tr

mat-header-row

*matHeaderRowDef="displayedColumns">

</tr>





<tr

mat-row

*matRowDef="let row; columns: displayedColumns;">

</tr>





</table>
