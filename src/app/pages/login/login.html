<div class="login-container">

  <mat-card class="login-card">

    <div class="logo">

      <mat-icon>account_circle</mat-icon>

      <h2>eBulletin</h2>

      <p>Connexion</p>

    </div>

    <form [formGroup]="form" (ngSubmit)="connexion()">

      <mat-form-field appearance="outline">

        <mat-label>Nom d'utilisateur</mat-label>

        <input
          matInput
          type="text"
          formControlName="username">

        <mat-icon matSuffix>person</mat-icon>

      </mat-form-field>

      <mat-form-field appearance="outline">

        <mat-label>Mot de passe</mat-label>

        <input
          matInput
          [type]="masquer ? 'password' : 'text'"
          formControlName="password">

        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="masquer = !masquer">

          <mat-icon>
            {{ masquer ? 'visibility_off' : 'visibility' }}
          </mat-icon>

        </button>

      </mat-form-field>

      <button
        mat-raised-button
        color="primary"
        type="submit">

        Se connecter

      </button>

      <button
        mat-button
        color="accent"
        type="button"
        (click)="retour()">

        Retour

      </button>

    </form>

  </mat-card>

</div>
