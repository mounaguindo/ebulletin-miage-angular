<app-page-header
  title="Bulletins"
  subtitle="Gestion des bulletins de salaire">
</app-page-header>


<table mat-table [dataSource]="bulletins">


  <ng-container matColumnDef="matricule">

    <th mat-header-cell *matHeaderCellDef>
      Matricule
    </th>

    <td mat-cell *matCellDef="let bulletin">
      {{ bulletin.matricule }}
    </td>

  </ng-container>



  <ng-container matColumnDef="employe">

    <th mat-header-cell *matHeaderCellDef>
      Employé
    </th>

    <td mat-cell *matCellDef="let bulletin">
      {{ bulletin.employe }}
    </td>

  </ng-container>



  <ng-container matColumnDef="mois">

    <th mat-header-cell *matHeaderCellDef>
      Mois
    </th>

    <td mat-cell *matCellDef="let bulletin">
      {{ bulletin.mois }}
    </td>

  </ng-container>



  <ng-container matColumnDef="salaire">

    <th mat-header-cell *matHeaderCellDef>
      Salaire
    </th>

    <td mat-cell *matCellDef="let bulletin">
      {{ bulletin.salaire }} FCFA
    </td>

  </ng-container>



  <ng-container matColumnDef="actions">

    <th mat-header-cell *matHeaderCellDef>
      Actions
    </th>


    <td mat-cell *matCellDef="let bulletin">


      <button
        mat-icon-button
        aria-label="Voir bulletin">

        <mat-icon>
          visibility
        </mat-icon>

      </button>


      <button
        mat-icon-button
        aria-label="Télécharger">

        <mat-icon>
          download
        </mat-icon>

      </button>


    </td>

  </ng-container>



  <tr
    mat-header-row
    *matHeaderRowDef="displayedColumns">
  </tr>


  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns;">
  </tr>


</table>
